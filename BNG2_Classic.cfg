#--------------------------------------------------echo "Connector Configuration"#--------------------------------------------------    port 1/1/c1        connector            breakout c1-100g        exit                                  no shutdown    exit    port 1/1/c2        connector            breakout c1-100g        exit        no shutdown    exit    port 1/1/c3        connector            breakout c1-100g        exit        no shutdown    exit    port 1/1/c4        connector            breakout c1-100g        exit        no shutdown    exit    port 1/1/c5        shutdown    exit    port 1/1/c6        shutdown    exit#--------------------------------------------------echo "Port Configuration"#--------------------------------------------------    port 1/1/c1/1        ethernet            mode access            encap-type dot1q        exit        no shutdown    exit                                  port 1/1/c2/1        ethernet            mode access            encap-type dot1q        exit        no shutdown    exit    port 1/1/c3/1        ethernet        exit        no shutdown    exit    port 1/1/c4/1        ethernet        exit        no shutdown    exit    port A/1    exit    port A/3        shutdown        ethernet        exit    exit    port A/4        shutdown    exit                    #--------------------------------------------------echo "LAG Configuration"#--------------------------------------------------    lag 1        mode access        encap-type dot1q        port 1/1/c1/1        port 1/1/c2/1        lacp active administrative-key 32768        no shutdown    exit    lag 2        port 1/1/c3/1        port 1/1/c4/1        no shutdown    exit#--------------------------------------------------echo "Redundancy Configuration"#--------------------------------------------------    redundancy        multi-chassis            peer 1.1.1.1 create                mc-lag                    hold-on-neighbor-failure 2                    keep-alive-interval 5                    lag 1 lacp-key 1 system-id 00:00:00:00:00:01 system-priority 100                    no shutdown                exit                sync                    local-dhcp-server                    srrp                    subscriber-mgmt                        ipoe                        pppoe                    exit                    no shutdown                       exit                no shutdown            exit        exit    exit#--------------------------------------------------echo "Router (Network Side) Configuration"#--------------------------------------------------    router Base        interface "system"            address 2.2.2.2/32            no shutdown        exit        interface "toBNG1"            address 172.16.1.1/24            port lag-2            no shutdown        exit#--------------------------------------------------echo "OSPFv2 Configuration"#--------------------------------------------------        ospf 0            area 0.0.0.0                interface "system"                    no shutdown                exit                interface "toBNG1"                    no shutdown                exit            exit                                  no shutdown        exit    exit#--------------------------------------------------echo "Service Configuration"#--------------------------------------------------    service        customer 1 name "1" create            description "Default customer"        exit        vprn 18 name "18" customer 1 create            subscriber-interface "toSubs" create                group-interface "subs" create                exit            exit            interface "loopback" create            exit            dhcp                local-dhcp-server "LOCAL" create                exit            exit        exit        vprn 18 name "18" customer 1 create            interface "loopback" create                address 192.168.1.1/32                local-dhcp-server "LOCAL"                loopback            exit            subscriber-interface "toSubs" create                address 10.1.1.254/24                group-interface "subs" create                    dhcp                        server 192.168.1.1                        lease-populate 70                        gi-address 10.1.1.254                        no shutdown                    exit                    sap lag-1:100 create                    exit                exit            exit            no shutdown        exit    exit#--------------------------------------------------echo "OSPFv2 Configuration"#--------------------------------------------------        ospf 0            no shutdown        exit    exit#--------------------------------------------------echo "Local DHCP Server (Services) Configuration"#--------------------------------------------------    service        vprn 18 name "18" customer 1 create            dhcp                local-dhcp-server "LOCAL" create                    use-gi-address                    pool "pool1" create                        options                            lease-time min 2                        exit                        subnet 10.1.1.0/24 create                            options                                subnet-mask 255.255.255.0                                default-router 10.1.1.254                            exit                            address-range 10.1.1.150 10.1.1.200                        exit                    exit                    no shutdown                exit            exit        exit    exit